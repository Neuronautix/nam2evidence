services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: namo_ind_mapper
      POSTGRES_USER: namo_user
      POSTGRES_PASSWORD: namo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namo_user -d namo_ind_mapper"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: dev
      # Override APP_SECRET via the host environment in production deployments,
      # e.g. `APP_SECRET=$(openssl rand -hex 32) docker compose up -d`.
      APP_SECRET: ${APP_SECRET:-dev_secret_replace_in_production}
      DATABASE_URL: "postgresql://namo_user:namo_password@db:5432/namo_ind_mapper?serverVersion=16&charset=utf8"
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$"
      DEFAULT_URI: "http://localhost:8080"
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/var/www/api:cached
      - api_vendor:/var/www/api/vendor

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Uncomment to build a development image instead of production.
      # Requires a `development` stage in frontend/Dockerfile (see
      # docker-compose.override.yml.example for the recommended pattern).
      # target: development
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
      NEXT_PUBLIC_DATA_MODE: "api"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  api_vendor:
